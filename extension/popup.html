<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 280px;
    padding: 20px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a1a;
    color: #e0e0e0;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .header-icon {
    width: 32px;
    height: 32px;
    background: rgba(16, 163, 127, 0.15);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .header-icon span { font-size: 18px; }
  .header-text h1 { font-size: 14px; font-weight: 600; color: #fff; }
  .header-text p { font-size: 11px; color: #888; margin-top: 2px; }
  .divider { height: 1px; background: #333; margin: 12px 0; }
  .info { font-size: 12px; color: #999; line-height: 1.6; }
  .info strong { color: #10a37f; }
  .pill-demo {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 1px 8px 1px 4px;
    border-radius: 999px;
    font-size: 11px;
    vertical-align: middle;
  }
  .pill-on { background: rgba(16, 163, 127, 0.15); color: #10a37f; }
  .pill-off { background: rgba(150, 150, 150, 0.15); color: #999; }
  .pill-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
  .pill-on .pill-dot { background: #10a37f; }
  .pill-off .pill-dot { background: #999; }
  .footer { margin-top: 12px; font-size: 11px; color: #555; text-align: center; }
  .footer a { color: #10a37f; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="header">
    <div class="header-icon"><span>↩</span></div>
    <div class="header-text">
      <h1>Code Wrap Toggle</h1>
      <p>v1.0.0</p>
    </div>
  </div>
  <div class="divider"></div>
  <div class="info">
    Every code block on ChatGPT now has a <strong>Wrap</strong> button.<br><br>
    <span class="pill-demo pill-on"><span class="pill-dot"></span> Wrap</span>
    = lines wrap to fit the screen<br>
    <span class="pill-demo pill-off"><span class="pill-dot"></span> Wrap</span>
    = original horizontal scroll
  </div>
  <div class="divider"></div>
  <div class="footer">
    <a href="https://github.com/maoli17/chatgpt-code-wrap" target="_blank">GitHub</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/maoli17/chatgpt-code-wrap/issues" target="_blank">Report Bug</a>
  </div>
</body>
</html>
