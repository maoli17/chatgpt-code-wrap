name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: ./build.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: chatgpt-code-wrap-*.zip
